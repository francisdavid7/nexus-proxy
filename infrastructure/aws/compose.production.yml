services:
  proxy-engine:
    build:
      context: ../../services/proxy-engine
      dockerfile: Dockerfile

    container_name: nexus-proxy-engine
    restart: unless-stopped
    init: true
    stop_grace_period: 15s

    env_file:
      - path: ./proxy-engine.env
        format: raw

    environment:
      APP_ENV: production
      LOG_LEVEL: info

      PROXY_PLAIN_ENABLED: "false"

      PROXY_TLS_ENABLED: "true"
      PROXY_TLS_HOST: "0.0.0.0"
      PROXY_TLS_PORT: "8443"
      PROXY_TLS_CERT_SOURCE: "/tls-source/tls.crt"
      PROXY_TLS_KEY_SOURCE: "/tls-source/tls.key"
      PROXY_TLS_CERT_FILE: "/run/nexus-tls/tls.crt"
      PROXY_TLS_KEY_FILE: "/run/nexus-tls/tls.key"

      PROXY_ALLOW_PRIVATE_IPS: "false"

    ports:
      - "8443:8443"

    volumes:
      - ./certs:/tls-source:ro

    tmpfs:
      - /run/nexus-tls:rw,noexec,nosuid,size=1m

    read_only: true

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --no-check-certificate https://127.0.0.1:8443/healthz >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
