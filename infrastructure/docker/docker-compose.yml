services:
  postgres:
    image: postgres:17-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
      POSTGRES_DB: nexus_proxy
    ports:
      - "5432:5432"
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_proxy"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexus-network

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - nexus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexus-network

  proxy-engine:
    build:
      context: ../../services/proxy-engine
      dockerfile: Dockerfile
    container_name: nexus-proxy-engine
    restart: unless-stopped
    env_file:
      - ../../services/proxy-engine/.env
    environment:
      APP_ENV: production
      LOG_LEVEL: info
      NODE_ID: local-node-01
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-network

volumes:
  nexus_postgres_data:
  nexus_redis_data:

networks:
  nexus-network:
    driver: bridge
